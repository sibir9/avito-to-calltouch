name: Sync Avito to Calltouch

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.ACTIONS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan github.com >> ~/.ssh/known_hosts
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/id_ed25519
        git remote set-url origin git@github.com:sibir9/avito-to-calltouch.git
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p logs data
    
    - name: Run sync script
      id: sync
      env:
        CALLTOUCH_ACCESS_TOKEN: ${{ secrets.CALLTOUCH_ACCESS_TOKEN }}
        CALLTOUCH_SITE_ID: ${{ secrets.CALLTOUCH_SITE_ID }}
      run: |
        python main.py
        echo "status=success" >> $GITHUB_OUTPUT
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sync-logs
        path: logs/
    
    - name: Send Telegram notification
      if: always()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "🔍 Проверка токена..."
        echo "Token (первые 10 символов): ${TELEGRAM_BOT_TOKEN:0:10}..."
        echo "Chat ID: $TELEGRAM_CHAT_ID"
        
        # Проверяем, что токен загружен
        if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
          echo "❌ ОШИБКА: TELEGRAM_BOT_TOKEN пуст!"
          exit 1
        fi
        
        # Проверяем формат токена
        if [[ ! "$TELEGRAM_BOT_TOKEN" =~ ^[0-9]+:[a-zA-Z0-9_-]+$ ]]; then
          echo "❌ ОШИБКА: Неправильный формат токена!"
          echo "Токен должен быть вида: 1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          exit 1
        fi
        
        echo "✅ Токен прошел базовую проверку"
        
        # Сначала проверим, работает ли бот (без отправки сообщения)
        echo "🔄 Проверяем доступность бота..."
        BOT_INFO=$(curl -s "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/getMe")
        echo "Ответ от getMe: $BOT_INFO"
        
        if [[ "$BOT_INFO" == *'"ok":true'* ]]; then
          echo "✅ Бот доступен!"
        else
          echo "❌ Бот недоступен!"
          exit 1
        fi
        
        # Теперь отправляем сообщение
        CURRENT_TIME=$(date '+%Y-%m-%d %H:%M:%S')
        
        if [[ "${{ job.status }}" == "success" ]]; then
          MESSAGE="✅ Успешная синхронизация Avito → Calltouch%0A"
          MESSAGE+="🕐 Время: $CURRENT_TIME%0A"
          MESSAGE+="📊 Статус: Все хорошо%0A"
          MESSAGE+="🔗 Логи: https://github.com/sibir9/avito-to-calltouch/actions/runs/${{ github.run_id }}"
        else
          MESSAGE="❌ Ошибка синхронизации Avito → Calltouch%0A"
          MESSAGE+="🕐 Время: $CURRENT_TIME%0A"
          MESSAGE+="⚠️ Статус: ${{ job.status }}%0A"
          MESSAGE+="🔗 Логи: https://github.com/sibir9/avito-to-calltouch/actions/runs/${{ github.run_id }}"
        fi
        
        echo "📤 Отправляем сообщение..."
        RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          -d text="$MESSAGE" \
          -d parse_mode="Markdown")
        
        echo "Ответ от Telegram: $RESPONSE"
        
        if [[ "$RESPONSE" == *'"ok":true'* ]]; then
          echo "✅ Сообщение отправлено успешно!"
        else
          echo "❌ Ошибка при отправке!"
          exit 1
        fi
    
    - name: Commit and push state
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -f data/last_sync.json
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        else
          git commit -m "Update last sync time [skip ci]"
          git push origin main
        fi
