name: Sync Avito to Calltouch

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4.2.2  # Конкретная версия
    
    - name: Set up Python
      uses: actions/setup-python@v5.4.0  # Конкретная версия
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p logs data
    
    - name: Run sync script
      env:
        CALLTOUCH_ACCESS_TOKEN: ${{ secrets.CALLTOUCH_ACCESS_TOKEN }}
        CALLTOUCH_SITE_ID: ${{ secrets.CALLTOUCH_SITE_ID }}
      run: |
        python main.py
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4.6.0  # Конкретная версия
      with:
        name: sync-logs
        path: logs/
    
    - name: Commit and push state
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/last_sync.json
        if ! git diff --quiet && ! git diff --staged --quiet; then
          git commit -m "Update last sync time"
          git push
        fi
