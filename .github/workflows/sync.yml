name: Sync Avito to Calltouch

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Run sync script
      env:
        CALLTOUCH_ACCESS_TOKEN: ${{ secrets.CALLTOUCH_ACCESS_TOKEN }}
        CALLTOUCH_SITE_ID: ${{ secrets.CALLTOUCH_SITE_ID }}
      run: |
        pip install -r requirements.txt
        mkdir -p logs data
        python main.py
    
    - name: Commit and push state
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/last_sync.json
        if ! git diff --quiet && ! git diff --staged --quiet; then
          git commit -m "Update last sync time [skip ci]"
          git push
        fi
