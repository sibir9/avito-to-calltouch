name: Sync Avito to Calltouch

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    
    steps:
    - uses: actions/checkout@v4
      with:
        ssh-key: ${{ secrets.DEPLOY_KEY }}  # Добавляем SSH ключ для checkout
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p logs data
    
    - name: Run sync script
      env:
        CALLTOUCH_ACCESS_TOKEN: ${{ secrets.CALLTOUCH_ACCESS_TOKEN }}
        CALLTOUCH_SITE_ID: ${{ secrets.CALLTOUCH_SITE_ID }}
      run: |
        python main.py
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sync-logs
        path: logs/
    
    - name: Commit and push state (if changed)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Добавляем файл принудительно
        git add -f data/last_sync.json
        
        # Проверяем, есть ли изменения для коммита
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        else
          git commit -m "Update last sync time [skip ci]"
          # Используем SSH URL для пуша
          git remote set-url origin git@github.com:sibir9/avito-to-calltouch.git
          git push origin main
        fi
      env:
        GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"  # Добавляем SSH настройки
